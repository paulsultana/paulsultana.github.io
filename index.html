<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Paul Sultana is a singer-songwriter and worship leader" />
        <meta name="author" content="Paul Sultana" />
        <title>Paul Sultana</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />

        <!-- Open Graph Protocol meta tags -->
        <!-- important ones -->
        <meta property="og:title" content="Paul Sultana">
        <meta property="og:description" content="Paul Sultana is a singer-songwriter and worship leader">
        <meta property="og:image" content="https://paulsultana.com/assets/mywebsitebg.png">
        <meta property="og:url" content="https://paulsultana.com">
          <!-- optional ones -->
        <meta property="og:type" content="website">
        <link rel="canonical" href="https://paulsultana.com">
       
        <link rel="preconnect" href="https://fonts.bunny.net">
        <link href="https://fonts.bunny.net/css?family=calistoga:400" rel="stylesheet" />
        
        <style>

            *{box-sizing: border-box;}

            body {
                margin: 0;
                background: url("assets/mywebsitebg.png") no-repeat center center fixed;
                background-size: cover;
                color: white;
                height: 100%;
            }

            /* HERO */

            .hero {
                min-height: 15vh;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
            }

            .hero h1 {
                font-family: "Calistoga", serif;
                font-size: clamp(3rem, 3vw, 4rem);
                color: rgba(255,255,255,0.9);
                font-weight: 500;
                margin: 0;
            }

            /* Sub */

            .sub {
                /* min-height: 15vh; */
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 3rem 0 1rem 0;
            }

            .sub h1 {
                font-family: "Calistoga", serif;
                font-size: clamp(2rem, 2vw, 3rem);
                color: rgba(255,255,255,0.9);
                font-weight: 400;
                margin: 0;
            }

            /* ALBUM GRID */

            .albums {
                width: min(1200px, 90%);
                margin: 0 auto;
                padding: 1rem 0;

                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 2rem;
            }

            .album {
                display: block;
            }

            .album img {
                width: 100%;
                display: block;
                border-radius: 4px;

                transition: transform .3s ease;
            }

            .album:hover img {
                transform: scale(1.03);
            }

            /* LINKS */

            .links {
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 2rem;

                padding: 3rem 1rem 5rem;
            }

            .links a {
                font-family: "Calistoga", serif;
                font-weight: 300;
                color: rgba(255,255,255,.85);
                text-decoration: none;
                font-size: 1.2rem;
            }

            .links a:hover {
                color: white;
            }

        </style>
    </head>
    <body>

        <header class="hero">
            <h1>Paul Sultana</h1>
        </header>

        <main>

            <section class="sub">
                <h1>Music</h1>
            </section>
            <section class="albums">

                <a class="album"
                href="https://paulsultana.bandcamp.com/track/way-back-home"
                target="_blank">
                    <img src="https://f4.bcbits.com/img/a2641140104_2.jpg" alt="Way Back Home">
                </a>

                <a class="album"
                href="https://paulsultana.bandcamp.com/track/let-your-face-shine-psalm-80"
                target="_blank">
                    <img src="https://f4.bcbits.com/img/a1157736720_2.jpg" alt="Let Your Face Shine (Psalm 80)">
                </a>

                <a class="album"
                href="https://paulsultana.bandcamp.com/album/songs-of-the-story-volume-1"
                target="_blank">
                    <img src="https://f4.bcbits.com/img/a0102994347_2.jpg" alt="Songs of the Story Volume 1">
                </a>

                <a class="album"
                href="https://paulsultana.bandcamp.com/track/heavy-wave"
                target="_blank">
                    <img src="https://f4.bcbits.com/img/a3567031688_2.jpg" alt="Heavy Wave">
                </a>

                <a class="album"
                href="https://paulsultana.bandcamp.com/track/to-my-parents"
                target="_blank">
                    <img src="https://f4.bcbits.com/img/a0041267243_2.jpg" alt="To My Parents">
                </a>

                <a class="album"
                href="https://paulsultana.bandcamp.com/track/wings-of-a-dove-acoustic"
                target="_blank">
                    <img src="https://f4.bcbits.com/img/a4231307322_2.jpg" alt="Wings of a Dove (Acoustic)">
                </a>

                <a class="album"
                href="https://paulsultana.bandcamp.com/track/wings-of-a-dove"
                target="_blank">
                    <img src="https://f4.bcbits.com/img/a1946093822_2.jpg" alt="Wings of a Dove">
                </a>

                <a class="album"
                href="https://paulsultana.bandcamp.com/track/right-on-time"
                target="_blank">
                    <img src="https://f4.bcbits.com/img/a1012500152_2.jpg" alt="Right on Time">
                </a>

                <a class="album"
                href="https://paulsultana.bandcamp.com/track/oceans"
                target="_blank">
                    <img src="https://f4.bcbits.com/img/a2766867767_2.jpg" alt="Oceans">
                </a>

                <a class="album"
                href="https://paulsultana.bandcamp.com/track/monsters"
                target="_blank">
                    <img src="https://f4.bcbits.com/img/a0342524419_2.jpg" alt="Monsters">
                </a>

                <a class="album"
                href="https://paulsultana.bandcamp.com/track/welcome-to-budapest"
                target="_blank">
                    <img src="https://f4.bcbits.com/img/a2885036850_2.jpg" alt="Welcome to Budapest">
                </a>
            </section>

            <section class="links">
                <a href="https://www.youtube.com/c/paulsultana" target="_blank">YouTube</a>
                <a href="https://www.instagram.com/thepaulsultana" target="_blank">Instagram</a>
                <a href="https://patreon.com/paulsultana" target="_blank">Patreon</a>
            </section>

        </main>

    </body>
</html>
